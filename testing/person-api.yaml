openapi: 3.0.3

info:
  title: Person API
  version: 1.0.0
  description: |
    A simple CRUD API for managing Person records. Designed as a test fixture
    for the MCP Gateway — every operation is richly documented so that
    auto-generated MCP tools have clear, useful descriptions for AI agents.

    ## Data model

    A **Person** has the following fields:

    | Field       | Type    | Notes                                      |
    |-------------|---------|--------------------------------------------|
    | id          | string  | UUID, assigned by the server               |
    | first_name  | string  | Required                                   |
    | last_name   | string  | Required                                   |
    | email       | string  | Unique, required, RFC 5321 format          |
    | phone       | string  | Optional, E.164 format recommended         |
    | age         | integer | Optional, 0–150                            |
    | address     | object  | Optional, nested street/city/country       |
    | tags        | array   | Optional string labels (e.g. "vip", "lead")|
    | created_at  | string  | ISO 8601, set by server on creation        |
    | updated_at  | string  | ISO 8601, updated on every write           |

    ## Pagination

    List endpoints accept `limit` (default 20, max 100) and `offset` query
    parameters and return a standard envelope:
    ```json
    { "data": [...], "total": 42, "limit": 20, "offset": 0 }
    ```

    ## Error format

    All errors return:
    ```json
    { "error": "human-readable message", "code": "MACHINE_CODE" }
    ```

  contact:
    name: MCP Gateway Test
    url: https://github.com/prasenjit-net/mcp-gateway

servers:
  - url: http://localhost:8081
    description: Local mock server

tags:
  - name: People
    description: Create, read, update, and delete Person records

# ─── Reusable components ────────────────────────────────────────────────────

components:
  schemas:

    Address:
      type: object
      description: Physical or mailing address for a person.
      properties:
        street:
          type: string
          description: Street address including house/apartment number.
          example: "742 Evergreen Terrace"
        city:
          type: string
          description: City or town name.
          example: "Springfield"
        state:
          type: string
          description: State, province, or region.
          example: "IL"
        postal_code:
          type: string
          description: ZIP or postal code.
          example: "62701"
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code.
          example: "US"

    Person:
      type: object
      description: A full Person record as stored and returned by the API.
      required: [id, first_name, last_name, email, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier assigned by the server on creation.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          readOnly: true
        first_name:
          type: string
          description: Person's given (first) name.
          example: "Jane"
        last_name:
          type: string
          description: Person's family (last) name.
          example: "Smith"
        email:
          type: string
          format: email
          description: Unique email address. Used as a natural key for lookups.
          example: "jane.smith@example.com"
        phone:
          type: string
          description: Contact phone number in E.164 format.
          example: "+14155552671"
          nullable: true
        age:
          type: integer
          minimum: 0
          maximum: 150
          description: Age in years.
          example: 34
          nullable: true
        address:
          $ref: '#/components/schemas/Address'
          nullable: true
        tags:
          type: array
          items:
            type: string
          description: Free-form labels attached to this person.
          example: ["vip", "newsletter"]
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when this record was created.
          example: "2026-01-15T09:30:00Z"
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the last modification.
          example: "2026-03-20T14:45:00Z"
          readOnly: true

    PersonInput:
      type: object
      description: |
        Payload for creating a new Person. All writable fields are accepted;
        `id`, `created_at`, and `updated_at` are ignored if provided.
      required: [first_name, last_name, email]
      properties:
        first_name:
          type: string
          description: Person's given (first) name.
          example: "John"
        last_name:
          type: string
          description: Person's family (last) name.
          example: "Doe"
        email:
          type: string
          format: email
          description: Unique email address for this person.
          example: "john.doe@example.com"
        phone:
          type: string
          description: Contact phone number (E.164 recommended).
          example: "+14155550199"
        age:
          type: integer
          minimum: 0
          maximum: 150
          description: Age in years.
          example: 28
        address:
          $ref: '#/components/schemas/Address'
        tags:
          type: array
          items:
            type: string
          description: Labels to attach to this person.
          example: ["lead"]

    PersonPatch:
      type: object
      description: |
        Partial update payload — only include fields you want to change.
        Omitted fields are left unchanged. To clear a nullable field, pass
        `null` explicitly.
      properties:
        first_name:
          type: string
          example: "Johnny"
        last_name:
          type: string
          example: "Doe"
        email:
          type: string
          format: email
          example: "johnny.doe@example.com"
        phone:
          type: string
          nullable: true
          example: "+14155550200"
        age:
          type: integer
          minimum: 0
          maximum: 150
          nullable: true
          example: 29
        address:
          $ref: '#/components/schemas/Address'
          nullable: true
        tags:
          type: array
          items:
            type: string
          example: ["lead", "vip"]

    PersonList:
      type: object
      description: Paginated list of Person records.
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Person'
        total:
          type: integer
          description: Total number of records matching the query (before pagination).
          example: 2
        limit:
          type: integer
          description: Maximum records returned in this page.
          example: 20
        offset:
          type: integer
          description: Number of records skipped.
          example: 0

    Error:
      type: object
      description: Standard error envelope returned on all 4xx/5xx responses.
      properties:
        error:
          type: string
          description: Human-readable description of what went wrong.
          example: "Person not found"
        code:
          type: string
          description: Machine-readable error code.
          example: "NOT_FOUND"

# ─── Paths ──────────────────────────────────────────────────────────────────

paths:

  /persons:

    get:
      operationId: listPersons
      summary: List all persons
      description: |
        Returns a paginated list of all Person records.

        **Pagination:** use `limit` and `offset` to page through results.
        The response always includes `total` so you can calculate the number
        of pages.

        **Filtering:** use `search` to do a case-insensitive substring match
        across `first_name`, `last_name`, and `email`. Use `tag` to filter
        by a specific label.

        Results are sorted by `created_at` descending (newest first) unless
        `sort` is provided.
      tags: [People]
      parameters:
        - name: limit
          in: query
          description: Maximum number of persons to return (1–100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: offset
          in: query
          description: Number of records to skip for pagination.
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
        - name: search
          in: query
          description: >
            Case-insensitive substring search across `first_name`,
            `last_name`, and `email`.
          schema:
            type: string
          example: "jane"
        - name: tag
          in: query
          description: Filter to persons that have this tag.
          schema:
            type: string
          example: "vip"
        - name: sort
          in: query
          description: >
            Sort order. One of `created_desc` (default), `created_asc`,
            `name_asc`, `name_desc`.
          schema:
            type: string
            enum: [created_desc, created_asc, name_asc, name_desc]
            default: created_desc
      responses:
        '200':
          description: Paginated list of persons.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonList'
              example:
                total: 2
                limit: 20
                offset: 0
                data:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    first_name: "Jane"
                    last_name: "Smith"
                    email: "jane.smith@example.com"
                    phone: "+14155552671"
                    age: 34
                    address:
                      street: "742 Evergreen Terrace"
                      city: "Springfield"
                      state: "IL"
                      postal_code: "62701"
                      country: "US"
                    tags: ["vip", "newsletter"]
                    created_at: "2026-01-15T09:30:00Z"
                    updated_at: "2026-03-20T14:45:00Z"
                  - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    first_name: "John"
                    last_name: "Doe"
                    email: "john.doe@example.com"
                    phone: "+14155550199"
                    age: 28
                    address:
                      street: "123 Main Street"
                      city: "Austin"
                      state: "TX"
                      postal_code: "73301"
                      country: "US"
                    tags: ["lead"]
                    created_at: "2026-02-10T11:00:00Z"
                    updated_at: "2026-02-10T11:00:00Z"

    post:
      operationId: createPerson
      summary: Create a new person
      description: |
        Creates a new Person record. The server assigns `id`, `created_at`,
        and `updated_at`.

        Returns `409 Conflict` if the `email` address is already in use.
      tags: [People]
      requestBody:
        required: true
        description: Person data. `first_name`, `last_name`, and `email` are required.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonInput'
            example:
              first_name: "Alice"
              last_name: "Johnson"
              email: "alice.johnson@example.com"
              phone: "+16505551234"
              age: 30
              address:
                street: "1 Infinite Loop"
                city: "Cupertino"
                state: "CA"
                postal_code: "95014"
                country: "US"
              tags: ["customer"]
      responses:
        '201':
          description: Person created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
              example:
                id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                first_name: "Alice"
                last_name: "Johnson"
                email: "alice.johnson@example.com"
                phone: "+16505551234"
                age: 30
                address:
                  street: "1 Infinite Loop"
                  city: "Cupertino"
                  state: "CA"
                  postal_code: "95014"
                  country: "US"
                tags: ["customer"]
                created_at: "2026-03-29T18:00:00Z"
                updated_at: "2026-03-29T18:00:00Z"
        '400':
          description: Validation error — missing required field or invalid value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "email is required"
                code: "VALIDATION_ERROR"
        '409':
          description: A person with this email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "email alice.johnson@example.com is already in use"
                code: "DUPLICATE_EMAIL"

  /persons/{id}:

    parameters:
      - name: id
        in: path
        required: true
        description: UUID of the Person to operate on.
        schema:
          type: string
          format: uuid
        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    get:
      operationId: getPerson
      summary: Get a person by ID
      description: |
        Fetches a single Person record by its UUID.

        Returns `404 Not Found` if no person with that ID exists.
      tags: [People]
      responses:
        '200':
          description: The requested Person record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                first_name: "Jane"
                last_name: "Smith"
                email: "jane.smith@example.com"
                phone: "+14155552671"
                age: 34
                address:
                  street: "742 Evergreen Terrace"
                  city: "Springfield"
                  state: "IL"
                  postal_code: "62701"
                  country: "US"
                tags: ["vip", "newsletter"]
                created_at: "2026-01-15T09:30:00Z"
                updated_at: "2026-03-20T14:45:00Z"
        '404':
          description: No person found with the given ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "person a1b2c3d4-e5f6-7890-abcd-ef1234567890 not found"
                code: "NOT_FOUND"

    put:
      operationId: replacePerson
      summary: Replace a person (full update)
      description: |
        Performs a **full replacement** of the Person record. All writable
        fields must be provided; any omitted optional field is cleared to
        its zero/null value.

        Use `PATCH /persons/{id}` if you only want to update specific fields.

        Returns `404 Not Found` if the person does not exist.
        Returns `409 Conflict` if the new email is already in use by another
        person.
      tags: [People]
      requestBody:
        required: true
        description: Complete replacement payload. All required fields must be included.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonInput'
            example:
              first_name: "Jane"
              last_name: "Smith-Williams"
              email: "jane.smith@example.com"
              phone: "+14155552671"
              age: 35
              address:
                street: "742 Evergreen Terrace"
                city: "Springfield"
                state: "IL"
                postal_code: "62701"
                country: "US"
              tags: ["vip", "newsletter", "premium"]
      responses:
        '200':
          description: Person replaced successfully — returns the updated record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                first_name: "Jane"
                last_name: "Smith-Williams"
                email: "jane.smith@example.com"
                phone: "+14155552671"
                age: 35
                address:
                  street: "742 Evergreen Terrace"
                  city: "Springfield"
                  state: "IL"
                  postal_code: "62701"
                  country: "US"
                tags: ["vip", "newsletter", "premium"]
                created_at: "2026-01-15T09:30:00Z"
                updated_at: "2026-03-29T22:00:00Z"
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "first_name is required"
                code: "VALIDATION_ERROR"
        '404':
          description: Person not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "person not found"
                code: "NOT_FOUND"
        '409':
          description: Email conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "email is already in use by another person"
                code: "DUPLICATE_EMAIL"

    patch:
      operationId: updatePerson
      summary: Partially update a person
      description: |
        Applies a **partial update** — only the fields included in the request
        body are changed. Omitted fields keep their current values.

        Pass `null` for a nullable field (e.g. `phone`, `age`, `address`) to
        explicitly clear it.

        Returns `404 Not Found` if the person does not exist.
      tags: [People]
      requestBody:
        required: true
        description: >
          Only the fields to update. At least one field must be provided.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonPatch'
            example:
              age: 35
              tags: ["vip", "newsletter", "premium"]
      responses:
        '200':
          description: Person updated successfully — returns the full updated record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                first_name: "Jane"
                last_name: "Smith"
                email: "jane.smith@example.com"
                phone: "+14155552671"
                age: 35
                address:
                  street: "742 Evergreen Terrace"
                  city: "Springfield"
                  state: "IL"
                  postal_code: "62701"
                  country: "US"
                tags: ["vip", "newsletter", "premium"]
                created_at: "2026-01-15T09:30:00Z"
                updated_at: "2026-03-29T22:05:00Z"
        '400':
          description: Validation error (e.g. invalid email format).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "invalid email format"
                code: "VALIDATION_ERROR"
        '404':
          description: Person not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "person not found"
                code: "NOT_FOUND"

    delete:
      operationId: deletePerson
      summary: Delete a person
      description: |
        Permanently deletes the Person record with the given ID.

        This operation is **irreversible**. Returns `204 No Content` on
        success (no response body). Returns `404 Not Found` if the person
        does not exist.
      tags: [People]
      responses:
        '204':
          description: Person deleted successfully. No response body.
        '404':
          description: Person not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "person not found"
                code: "NOT_FOUND"

  /persons/by-email/{email}:

    get:
      operationId: getPersonByEmail
      summary: Look up a person by email address
      description: |
        Fetches a single Person record using their email address as a natural
        key. Useful when you have the email but not the UUID.

        The lookup is **case-insensitive** — `Jane@Example.COM` matches
        `jane@example.com`.

        Returns `404 Not Found` if no person has that email.
      tags: [People]
      parameters:
        - name: email
          in: path
          required: true
          description: The email address to look up (URL-encoded if it contains special characters).
          schema:
            type: string
            format: email
          example: "jane.smith@example.com"
      responses:
        '200':
          description: Person record matching the email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                first_name: "Jane"
                last_name: "Smith"
                email: "jane.smith@example.com"
                phone: "+14155552671"
                age: 34
                address:
                  street: "742 Evergreen Terrace"
                  city: "Springfield"
                  state: "IL"
                  postal_code: "62701"
                  country: "US"
                tags: ["vip", "newsletter"]
                created_at: "2026-01-15T09:30:00Z"
                updated_at: "2026-03-20T14:45:00Z"
        '404':
          description: No person found with that email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "no person found with email jane.smith@example.com"
                code: "NOT_FOUND"
