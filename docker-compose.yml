services:
  gateway:
    build: .
    ports:
      - "9876:9876"
    environment:
      - LISTEN_ADDR=:9876
      - DATA_DIR=/data
      - LOG_LEVEL=info
      - GATEWAY_SECRET=change-me-in-production
    volumes:
      - gateway-data:/data
    depends_on:
      - mock-api
    restart: unless-stopped

  # Example mock upstream using httpbin
  mock-api:
    image: kennethreitz/httpbin
    ports:
      - "8081:80"

volumes:
  gateway-data:
